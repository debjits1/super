server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /resources/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  error_page 404 /index.html;
}
